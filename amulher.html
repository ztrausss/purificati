<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>O Mundo de Alyne</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in {
      animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>
</head>
<body class="bg-black font-serif text-slate-200 selection:bg-emerald-500/30">

  <div class="flex flex-col items-center justify-start min-h-screen p-4 pt-12">
    
    <!-- Título Principal -->
    <div class="text-center mb-8 animate-in" style="animation-duration: 0.7s;">
      <h1 class="text-white text-xl md:text-2xl font-bold tracking-[0.4em] uppercase opacity-90">
        O Mundo de <span class="text-emerald-400">Alyne</span>
      </h1>
      <div class="h-[1px] w-8 bg-emerald-500/40 mx-auto mt-2"></div>
      <p class="text-emerald-100/30 text-[8px] italic mt-2 tracking-[0.3em] uppercase font-light">
        Dra. Alyne • 08 de Março
      </p>
    </div>

    <!-- Contentor Principal da Imagem (Proporção 1:1) -->
    <div 
      id="image-container"
      class="relative w-full max-w-[450px] aspect-square rounded-[2rem] overflow-hidden shadow-[0_0_80px_rgba(0,0,0,1)] border border-white/5 transition-colors"
    >
      <!-- Imagem de Fundo -->
      <img 
        src="https://i.imgur.com/mJOHLfP.jpeg" 
        alt="O Mundo de Alyne"
        class="absolute inset-0 w-full h-full object-cover"
      />
      
      <!-- Overlay Escuro -->
      <div class="absolute inset-0 bg-black/10 pointer-events-none"></div>

      <!-- Contentor onde os pontos serão injetados pelo JavaScript -->
      <div id="hotspots-container"></div>
    </div>

    <!-- Mensagem e Botão de Calibração -->
    <div class="mt-8 text-center flex flex-col items-center gap-4">
      <p class="text-white text-[7px] tracking-[0.5em] uppercase opacity-30 animate-pulse">
        Exploração Tátil • Versão Atualizada
      </p>
      
      <button 
        id="calib-btn"
        onclick="toggleCalibration()"
        class="px-4 py-2 bg-emerald-900/40 border border-emerald-500/30 rounded-full text-[10px] text-emerald-400 uppercase tracking-widest hover:bg-emerald-800/60 transition-colors"
      >
        Modo de Calibração
      </button>

      <!-- Display de Calibração (escondido por defeito) -->
      <div id="calib-display" class="hidden p-3 bg-black/80 border border-emerald-500 rounded-lg text-emerald-400 text-xs shadow-lg">
        Toca no objeto na imagem para ver as coordenadas.<br/>
        Último toque: <b class="text-white text-sm">X: <span id="calib-x">0</span>% | Y: <span id="calib-y">0</span>%</b>
      </div>
    </div>

  </div>

  <!-- Janela Modal (Escondida por defeito) -->
  <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/95 backdrop-blur-md">
    <div class="bg-[#0f172a]/98 border border-emerald-500/30 w-full max-w-[380px] rounded-3xl overflow-hidden shadow-2xl relative animate-in">
      
      <!-- Botão Fechar -->
      <button 
        onclick="closeModal()"
        class="absolute top-6 right-6 text-slate-500 hover:text-white transition-all"
      >
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>

      <div class="p-8">
        <div class="flex items-center gap-4 mb-6">
          <div id="modal-icon-container" class="p-3 bg-emerald-500/10 rounded-xl text-emerald-400 border border-emerald-500/20">
            <!-- Ícone injetado por JS -->
          </div>
          <h2 id="modal-title" class="text-md font-bold text-white tracking-wider uppercase"></h2>
        </div>

        <p id="modal-desc" class="text-slate-300 text-sm leading-relaxed mb-6 font-light italic"></p>

        <!-- Caixa de Detalhe -->
        <div class="bg-emerald-950/40 p-4 rounded-xl border border-emerald-900/40 flex gap-3">
          <i data-lucide="sparkles" class="w-4 h-4 text-emerald-400 shrink-0 mt-0.5"></i>
          <p id="modal-detail" class="text-[11px] italic text-emerald-100/80 leading-snug"></p>
        </div>
      </div>

      <!-- Rodapé do Modal -->
      <div class="px-8 py-4 bg-emerald-900/20 border-t border-white/5 flex justify-between items-center">
        <span class="text-[7px] uppercase tracking-[0.3em] text-emerald-500/60 font-bold">
          Mural Digital Alyne
        </span>
        <i data-lucide="heart" class="w-3 h-3 text-emerald-500 fill-emerald-500/30 animate-pulse"></i>
      </div>
    </div>
  </div>

  <!-- Lógica JavaScript -->
  <script>
    // Definição dos pontos interativos (Hotspots) com as coordenadas perfeitas
    const hotspots = [
      {
        id: 'faith',
        x: '15%',
        y: '55%',
        icon: 'cross',
        label: 'Fé',
        title: 'Fé & Horizonte',
        description: 'A tua fé católica é a luz que atravessa a janela da alma. É a força que te guia e o sentido maior por trás de cada fórmula e diagnóstico.',
        detail: 'Raízes profundas na fé, ramos que tocam o céu.'
      },
      {
        id: 'doctorate',
        x: '94%',
        y: '77%',
        icon: 'award',
        label: 'Doutorado',
        title: 'Dra. Alyne: O Doutorado',
        description: 'Este diploma recém-conquistado é o símbolo de anos de esforço, noites em claro e uma mente que nunca para de evoluir. Parabéns, Doutora!',
        detail: 'O auge de uma trajetória académica brilhante.'
      },
      {
        id: 'dinosaurs',
        x: '31%',
        y: '20%',
        icon: 'mountain',
        label: 'Infância',
        title: 'O Vale Encantado',
        description: 'O teu gosto por dinossauros nasceu na infância com o "Vale Encantado". Este quadro é uma ponte para as tuas lembranças mais puras e queridas.',
        detail: 'A criança que amava gigantes hoje descobre os segredos do micro-mundo.'
      },
      {
        id: 'coins',
        x: '88%',
        y: '25%',
        icon: 'coins',
        label: 'Coleção',
        title: 'Colecionadora de Brilho',
        description: 'Tu vês valor onde outros vêm apenas metal. A tua coleção de moedas brilhantes é um tesouro de memórias e detalhes que só tu sabes apreciar.',
        detail: 'Pequenos brilhos para uma vida reluzente.'
      },
      {
        id: 'alyne',
        x: '50%',
        y: '35%',
        icon: 'user',
        label: 'Alyne',
        title: 'Alyne: A Mente e o Coração',
        description: 'Uma cientista que carrega a determinação da Enfermagem e a precisão da Farmácia. A tua inteligência transforma ciência em cuidado. A criatura que amo e admiro, que desejo me casar com (Um certo alguém)',
        detail: 'Raciocinar é a tua arte; cuidar é a tua essência.'
      },
      {
        id: 'chocolate',
        x: '7%',
        y: '82%',
        icon: 'candy',
        label: 'Doce',
        title: 'O Doce Dilema',
        description: 'A cientista tenta evitar, mas o chocolatinho sempre vence! É o combustível doce para os teus momentos de raciocínio intenso.',
        detail: 'Porque até as mentes mais lógicas precisam de doçura.'
      },
      {
        id: 'science',
        x: '15%',
        y: '75%',
        icon: 'microscope',
        label: 'Ciência',
        title: 'O Micro-universo',
        description: 'Nas lentes do microscópio, tu vês o que é invisível aos olhos comuns. A tua paixão pela microbiologia revela a beleza da vida.',
        detail: 'Onde a ciência encontra a poesia da realidade.'
      },
      {
        id: 'adelina',
        x: '50%',
        y: '80%',
        icon: 'cat',
        label: 'Adelina',
        title: 'Adelina: A Sábia Anciã',
        description: 'Mais de uma década de cumplicidade. Uma siamesa que ama o ar condicionado e adora dar-te cabeçadas de carinho na madrugada.',
        detail: 'A guardiã dos teus segredos e das tuas noites de sono.'
      },
      {
        id: 'nature',
        x: '68%',
        y: '55%',
        icon: 'leaf',
        label: 'Plantas',
        title: 'Resiliência: Rosa do Deserto',
        description: 'Como as tuas plantas, tu floresces com força e paciência. Tu cultivas a vida com a mesma delicadeza com que geres o teu conhecimento.',
        detail: 'Beleza que nasce da persistência e do cuidado.'
      }
    ];

    // --- Renderização Dinâmica dos Pontos (Hotspots) ---
    const hotspotsContainer = document.getElementById('hotspots-container');

    hotspots.forEach(spot => {
      // Cria a div principal do ponto
      const spotElement = document.createElement('div');
      spotElement.className = "absolute z-20 transform -translate-x-1/2 -translate-y-1/2 group";
      spotElement.style.left = spot.x;
      spotElement.style.top = spot.y;

      // HTML interno do ponto
      spotElement.innerHTML = `
        <span class="absolute bottom-full mb-2 left-1/2 -translate-x-1/2 px-2 py-1 bg-black/80 text-emerald-400 text-[8px] uppercase tracking-widest rounded opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none whitespace-nowrap border border-emerald-500/30">
          ${spot.label}
        </span>
        <button onclick="openModal('${spot.id}')" class="flex items-center justify-center transition-all hover:scale-110 active:scale-95 focus:outline-none">
          <div class="relative">
            <div class="absolute inset-0 rounded-full bg-emerald-400/30 animate-ping"></div>
            <div class="relative bg-emerald-600/90 p-2 md:p-2.5 rounded-full border border-white/40 backdrop-blur-md shadow-xl group-hover:bg-emerald-500 transition-all">
              <i data-lucide="${spot.icon}" class="w-3 h-3 md:w-4 md:h-4 text-white"></i>
            </div>
          </div>
        </button>
      `;

      hotspotsContainer.appendChild(spotElement);
    });

    // Inicia a renderização dos ícones Lucide recém adicionados
    lucide.createIcons();

    // --- Lógica do Modal ---
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modal-title');
    const modalDesc = document.getElementById('modal-desc');
    const modalDetail = document.getElementById('modal-detail');
    const modalIconContainer = document.getElementById('modal-icon-container');

    function openModal(id) {
      const spot = hotspots.find(h => h.id === id);
      if (!spot) return;

      // Popula o Modal com os dados do objeto selecionado
      modalTitle.textContent = spot.title;
      modalDesc.textContent = `"${spot.description}"`;
      modalDetail.textContent = spot.detail;
      
      // Atualiza o Ícone no Modal
      modalIconContainer.innerHTML = `<i data-lucide="${spot.icon}" class="w-5 h-5 text-emerald-400"></i>`;
      lucide.createIcons({ root: modalIconContainer }); // Renderiza apenas o ícone do modal

      // Mostra o Modal
      modal.classList.remove('hidden');
    }

    function closeModal() {
      modal.classList.add('hidden');
    }

    // --- Lógica de Calibração ---
    let calibrationMode = false;
    const imgContainer = document.getElementById('image-container');
    const calibBtn = document.getElementById('calib-btn');
    const calibDisplay = document.getElementById('calib-display');
    const calibX = document.getElementById('calib-x');
    const calibY = document.getElementById('calib-y');

    function toggleCalibration() {
      calibrationMode = !calibrationMode;
      
      if (calibrationMode) {
        imgContainer.classList.add('cursor-crosshair', 'ring-2', 'ring-emerald-500');
        calibBtn.textContent = 'Desativar Calibração';
        calibDisplay.classList.remove('hidden');
      } else {
        imgContainer.classList.remove('cursor-crosshair', 'ring-2', 'ring-emerald-500');
        calibBtn.textContent = 'Modo de Calibração';
        calibDisplay.classList.add('hidden');
      }
    }

    imgContainer.addEventListener('click', (e) => {
      if (!calibrationMode) return;
      
      // Calcula as coordenadas X e Y percentuais baseadas no clique
      const rect = imgContainer.getBoundingClientRect();
      const x = Math.round(((e.clientX - rect.left) / rect.width) * 100);
      const y = Math.round(((e.clientY - rect.top) / rect.height) * 100);
      
      // Atualiza o ecrã
      calibX.textContent = x;
      calibY.textContent = y;
    });

  </script>
</body>
</html>
